name: publish

on:
  push:
    branches: [release]

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW="${major}.${minor}.$((patch + 1))"

          # Update both version sources
          python3 -c "
          import json
          conf = json.load(open('src-tauri/tauri.conf.json'))
          conf['version'] = '$NEW'
          json.dump(conf, open('src-tauri/tauri.conf.json', 'w'), indent=2)
          "
          npm version "$NEW" --no-git-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json package.json package-lock.json
          git commit -m "Bump version to v${NEW}"
          git push origin release
          git push origin release:main

          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Extract signing identity
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        id: tauri
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: See assets to download and install.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH=$(find src-tauri/target -name "*.dmg" | head -1)
          NEW_SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          FILE_SHA=$(gh api repos/maferland/homebrew-tap/contents/Casks/differ.rb --jq '.sha')
          CURRENT=$(gh api repos/maferland/homebrew-tap/contents/Casks/differ.rb --jq '.content' | base64 -d)

          UPDATED=$(echo "$CURRENT" | sed "s/sha256 \"[a-f0-9]*\"/sha256 \"$NEW_SHA\"/" | sed "s/version \"[^\"]*\"/version \"$VERSION\"/")
          CONTENT=$(echo "$UPDATED" | base64)

          gh api repos/maferland/homebrew-tap/contents/Casks/differ.rb \
            -X PUT \
            -f message="Update differ cask to v${VERSION}" \
            -f content="$CONTENT" \
            -f sha="$FILE_SHA"
